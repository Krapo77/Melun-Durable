<!DOCTYPE html>
<html>
<head>
    <title>Melun Open Data Challenge</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; height: 100vh; }
        #sidebar { width: 300px; padding: 20px; background: #2c3e50; color: white; overflow-y: auto; }
        #map { flex: 1; }
        .legend { background: white; padding: 10px; color: black; border-radius: 5px; line-height: 1.5; }
        .score-box { padding: 10px; margin: 10px 0; border-radius: 5px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h2>Melun Durable</h2>
        <p>Analyse de proximité (5 min à pied) aux services éco-citoyens.</p>
        <div class="score-box" style="background: #27ae60;">Score 4/4 : Zone Idéale</div>
        <div class="score-box" style="background: #f1c40f; color: black;">Score 2/4 : Zone Moyenne</div>
        <div class="score-box" style="background: #e74c3c;">Score 0/4 : Zone Défavorable</div>
        
        <hr/>
        <h3>Filtres Éco-services</h3>
        <label><input type="checkbox" data-type="irve" checked> Bornes de Recharge (Bleu)</label><br><br>
        <label><input type="checkbox" data-type="tri" checked> Points de Tri (Orange)</label><br><br>
        <label><input type="checkbox" data-type="sport" checked> Équipements Sportifs (Violet)</label><br><br>
        <label><input type="checkbox" data-type="vert" checked> Espaces Verts (Vert)</label>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initialisation globale de la carte
        const map = L.map('map').setView([48.541, 2.655], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Cette fonction sera appelée dès que Python aura injecté les données
        function initMapWithData(data) {
            if (!data) return;

            // 1. Affichage de la Heatmap de score
            const colors = ['#e74c3c', '#e67e22', '#f1c40f', '#2ecc71', '#27ae60'];
            data.analysis.forEach(p => {
                L.circle([p.lat, p.lng], {
                    radius: 40, 
                    color: colors[p.score] || '#f1c40f', 
                    fillOpacity: 0.4, 
                    stroke: false
                }).addTo(map);
            });

            // 2. Création et affichage des marqueurs par calques
            const layers = {
                irve: L.layerGroup().addTo(map),
                tri: L.layerGroup().addTo(map),
                sport: L.layerGroup().addTo(map),
                vert: L.layerGroup().addTo(map)
            };

            const icons = { irve: 'blue', tri: 'orange', sport: 'purple', vert: 'green' };
            
            Object.keys(data.markers).forEach(key => {
                if (layers[key]) {
                    data.markers[key].forEach(m => {
                        L.circleMarker(m, { 
                            radius: 6, 
                            color: '#fff',
                            weight: 1,
                            fillColor: icons[key], 
                            fillOpacity: 0.8 
                        }).addTo(layers[key]);
                    });
                }
            });

            // 3. Gestion dynamique des cases à cocher (filtres)
            document.querySelectorAll('input[type="checkbox"]').forEach(input => {
                input.onchange = (e) => {
                    const type = e.target.getAttribute('data-type');
                    if (layers[type]) {
                        if (e.target.checked) {
                            map.addLayer(layers[type]);
                        } else {
                            map.removeLayer(layers[type]);
                        }
                    }
                };
            });
        }
    </script>
</body>
</html>
